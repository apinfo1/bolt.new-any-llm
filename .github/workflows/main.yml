name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 */3 * *' # Trigger every 3 days at midnight UTC

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Set up Node.js (avoids deprecation warnings)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Step 2: Checkout your repository
      - name: Checkout your repository
        uses: actions/checkout@v3

      # Step 3: Sync with the original repository
      - name: Sync with the original repository
        run: |
          ORIGINAL_REPO=https://github.com/coleam00/bolt.new-any-llm.git
          git remote remove upstream || echo "Upstream does not exist, skipping removal"
          git remote add upstream $ORIGINAL_REPO
          git fetch upstream || echo "Fetch failed"
          git merge upstream/main --allow-unrelated-histories -m "Sync with original repository" || echo "Merge failed"
          git push origin main || echo "Push failed"

      # Step 4: Ensure the port is set to 7014 in the Dockerfile
      - name: Override Dockerfile Port
        run: |
          sed -i 's/EXPOSE [0-9]*/EXPOSE 7014/' Dockerfile # Update the exposed port
          git add Dockerfile
          git commit -m "Ensure Dockerfile uses port 7014"
          git push origin main || echo "Push failed"

      # Step 5: Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 6: Build and push the Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
