name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # Trigger workflow when changes are pushed to the main branch
  schedule:
    - cron: '0 0 */3 * *'  # Trigger every 3 days at midnight UTC

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository
      - name: Checkout your repository
        uses: actions/checkout@v3

      # Step 2: Sync with the original repository
      - name: Sync with the original repository
        run: |
          ORIGINAL_REPO=https://github.com/coleam00/bolt.new-any-llm.git
          git remote add upstream $ORIGINAL_REPO || echo "Upstream already added"
          git fetch upstream || echo "Fetch failed"
          git merge upstream/main --allow-unrelated-histories -m "Sync with original repository" || echo "Merge failed"
          git push origin main || echo "Push failed"

      # Step 3: Ensure the port is set to 7014 in the Dockerfile
      - name: Override Dockerfile Port
        run: |
          sed -i 's/^EXPOSE .*/EXPOSE 7014/' Dockerfile  # Update the exposed port
          git add Dockerfile
          git commit -m "Ensure Dockerfile uses port 7014"
          git push origin main || echo "Push failed"

      # Step 4: Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Build and push the Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .  # The root directory of your repository as the Docker build context
          push: true  # Push the image to the registry
          tags: ghcr.io/${{ github.repository }}:latest
