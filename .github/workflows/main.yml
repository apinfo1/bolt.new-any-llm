name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  schedule:
    # Runs every 3 days at midnight UTC
    - cron: '0 0 */3 * *'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js (Optional: Avoid warnings)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Build the Docker image
      - name: Build Docker image
        run: docker build -t my-image-name:latest .

      # Step 4: Push Docker image (if required)
      # Uncomment the next lines if you want to push to a registry
      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
      - name: Push Docker image
        run: docker push my-image-name:latest
