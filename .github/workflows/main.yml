name: Build and Push Docker Image

on:
  push:
    branches:
      - main   # Trigger workflow when changes are pushed to the main branch
  schedule:
    - cron: '0 0 * * 1'  # Optional: Weekly rebuild to capture base image updates (every Monday at midnight)

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repository code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Log in to GitHub Container Registry
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Step 3: Build and push the Docker image
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .  # The root directory of your repository as the Docker build context
        push: true  # Push the image to the registry
        tags: ghcr.io/${{ github.repository }}:latest
